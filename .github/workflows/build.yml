name: Build Aeternum Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'


      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - run: gradle wrapper --gradle-version 8.8 --distribution-type bin

      - run: ./gradlew build --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: aeternum-mod
          path: build/libs/*.jar
